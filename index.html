<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCO 사령관님의 비밀 벙커</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .bunker-box { border: 2px solid #238636; padding: 30px; border-radius: 20px; background-color: #161b22; box-shadow: 0 0 20px rgba(35, 134, 54, 0.3); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #238636; font-size: 1.5rem; margin-bottom: 5px; }
        .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 20px; }
        .price-main { font-size: 2.5rem; font-weight: bold; color: #58a6ff; margin: 20px 0; }
        .alt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; border-top: 1px solid #30363d; padding-top: 20px; }
        .alt-item { background: #0d1117; padding: 10px; border-radius: 10px; border: 1px solid #30363d; }
        .alt-name { font-size: 0.8rem; color: #8b949e; }
        .alt-price { font-size: 1.1rem; color: #d2a8ff; font-weight: bold; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #238636; }
        .fng-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; background: #238636; color: white; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="bunker-box">
        <div class="fng-badge" id="fng-val">시장 심리 파악 중...</div>
        <h1>🦊 COCO COMMANDER BUNKER 🫡</h1>
        <div class="subtitle">비밀 기지(Altcoins Branch) 데이터 수신 중...</div>
        
        <div class="price-main" id="btc-price">보급 대기...</div>

        <div class="alt-grid">
            <div class="alt-item"><div class="alt-name">🎬 RENDER</div><div class="alt-price" id="render-price">-</div></div>
            <div class="alt-item"><div class="alt-name">🌡️ ONDO</div><div class="alt-price" id="ondo-price">-</div></div>
            <div class="alt-item"><div class="alt-name">☀️ SOLANA</div><div class="alt-price" id="sol-price">-</div></div>
            <div class="alt-item"><div class="alt-name">💧 SUI</div><div class="alt-price" id="sui-price">-</div></div>
        </div>

        <p style="color: #e3b341;">"75,200달러 거미줄 성공! 본진 사수 중!"</p>
        <div class="footer">🧙‍♂️✨🌳 행운이 팡팡! 🔥🍀🚀</div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                // 1. 업비트 BTC 가격 (원화)
                const btcRes = await fetch('https://api.upbit.com/v1/ticker?markets=KRW-BTC');
                const btcData = await btcRes.json();
                document.getElementById('btc-price').innerText = btcData[0].trade_price.toLocaleString() + ' 원';

                // 2. 바이낸스 가격 (달러) - 더 빠르고 안정적인 보급로! ㅉㅉㅉ!
                const coins = {
                    'render-price': 'RENDERUSDT',
                    'ondo-price': 'ONDOUSDT',
                    'sol-price': 'SOLUSDT',
                    'sui-price': 'SUIUSDT'
                };

                for (const [id, symbol] of Object.entries(coins)) {
                    try {
                        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
                        const data = await res.json();
                        let price = parseFloat(data.price);
                        let formattedPrice = price > 10 ? price.toFixed(2) : price.toFixed(3);
                        document.getElementById(id).innerText = '$' + formattedPrice;
                    } catch (err) {
                        console.log(symbol + " 보급 실패");
                    }
                }

                // 3. 공포탐욕 지수
                const fngRes = await fetch('https://api.alternative.me/fng/');
                const fngData = await fngRes.json();
                document.getElementById('fng-val').innerText = '시장 심리: ' + fngData.data[0].value + ' (' + fngData.data[0].value_classification + ')';
            } catch (e) {
                console.log("보급로 차단! 재시도 중...");
            }
        }
        updateDashboard();
        setInterval(updateDashboard, 30000); // 30초마다 자동 갱신! ㅉㅉㅉ!
    </script>
</body>
</html>
