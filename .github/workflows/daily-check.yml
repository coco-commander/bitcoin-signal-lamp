name: Secret Bitcoin Monitor
on:
  schedule:
    - cron: '7,37 * * * *'    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'altcoins' # <--- 사령관님의 비밀 브랜치 고정!

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run price check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python price_check.py # 에러 시 로그 확인을 위해 깔끔하게 실행!

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          touch last_price.txt
          git add last_price.txt
          git commit -m "Update history" || echo "No changes"
          git push origin altcoins # 비밀 기지로 다시 보고!
