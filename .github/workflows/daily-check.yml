name: Daily Bitcoin Monitor
on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 (UTC 00:00)
  workflow_dispatch: # 사령관님 전용 수동 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # 로봇에게 파일을 새로 쓸 수 있는 권한을 줍니다!
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run price check
        run: python price_check.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt
          git commit -m "Auto-update BTC price" || echo "No changes to commit"
          git push
