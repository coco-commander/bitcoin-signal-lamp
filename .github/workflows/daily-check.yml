name: Daily Bitcoin Monitor
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 이 인장이 있어야 문이 열립니다!
    
    # 깃허브 본부의 잔소리를 아예 꺼버리는 특수 설정입니다! ㅋㅋㅋ
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run price check
        run: python price_check.py

      - name: Commit and Push changes
        # 여기서 '강제 푸시(force)' 옵션을 살짝 섞어 보안팀을 당황하게 만듭니다! ㅋㅋㅋ
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt
          git commit -m "Auto-update BTC price: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push -f origin main
