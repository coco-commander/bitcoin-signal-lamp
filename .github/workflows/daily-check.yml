name: Daily Bitcoin Monitor
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env: # 최신 버전 경고를 끄고 강제로 실행하게 만드는 장치입니다!
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 최신 v4 버전 사용!

      - name: Set up Python
        uses: actions/setup-python@v5 # 최신 v5 버전 사용!
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run price check
        run: python price_check.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt
          git commit -m "Auto-update BTC price" || echo "No changes to commit"
          git push
