name: Daily Bitcoin Monitor
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 이 직인이 있어야 보안팀이 길을 비켜줍니다!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run price check
        # 로봇에게 "내 발밑에 있는 수첩을 찾아!"라고 강하게 지시합니다.
        run: python price_check.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 수첩이 없으면 만들고, 현재 시간을 강제로 적어 변화를 줍니다!
          touch history.txt
          echo "Last check: $(date)" >> history.txt
          
          git add history.txt
          # 변화가 있든 없든 로봇이 울지 않도록 처리했습니다! ㅋㅋㅋ
          git commit -m "Auto-update BTC price: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main
