name: Daily Bitcoin Monitor
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 사령관님의 직인이 찍힌 쓰기 권한!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run price check
        # 로봇이 파이썬을 실행할 때 길을 잃지 않도록 경로를 강제 지정합니다!
        run: python price_check.py

      - name: Commit and Push changes
        # 여기가 승부처입니다! 수첩이 없으면 만들고, 강제로 저장하게 합니다!
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          touch history.txt
          git add history.txt
          git commit -m "Auto-update BTC price: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main
