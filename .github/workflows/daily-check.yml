name: Daily Bitcoin Monitor
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run price check with auto-install
        # 여기서 라이브러리 설치와 실행을 동시에 해서 로봇이 딴소리 못 하게 만듭니다! ㅋㅋㅋ
        run: |
          pip install requests
          python price_check.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.txt
          git commit -m "Auto-update BTC price" || echo "No changes to commit"
          git push
