name: Daily Bitcoin Monitor
on:
  schedule:
    # 한국 시간 기준: 09:07, 15:07, 21:07에 로봇이 출동합니다!
    # (UTC 기준: 00:07, 06:07, 12:07)
    - cron: '7 * * * *'    
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run price check
        # [핵심 보안!] 금고에서 보물을 꺼내 로봇에게 전달합니다.
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python price_check.py || echo "Price check failed but continuing..."

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # [핵심 수리] 파일이 없어도 에러나지 않게 빈 파일을 먼저 생성합니다! ㅉㅉㅉ!
          touch history.txt last_price.txt
          
          date >> history.txt
          git add history.txt last_price.txt
          
          # 변경사항이 없어도 에러 없이 넘어가도록 설정했습니다.
          git commit -m "Auto-update BTC price: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin HEAD
