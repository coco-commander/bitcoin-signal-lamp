name: Daily Bitcoin Monitor
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 깃허브 본부의 모든 시비를 무시하는 '무적' 설정입니다! ㅋㅋㅋ
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 사령관님의 직인이 찍힌 쓰기 권한!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run price check
        # 로봇이 가격을 캐오면 즉시 수첩에 적게 경로를 고정합니다!
        run: python price_check.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 수첩 업데이트를 강제로 진행합니다! ㅋㅋㅋ
          touch history.txt
          echo "Last check: $(date +'%Y-%m-%d %H:%M:%S')" >> history.txt
          
          git add history.txt
          git commit -m "Auto-update BTC price: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main
